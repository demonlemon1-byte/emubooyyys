
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic 2 Simon Wai</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents scrollbars while playing */
        }

        #game-container { 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
        }

        /* Loading text while the emulator boots */
        #loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="loading-overlay">Loading...</div>
    <div id="game"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // --- CONFIGURE YOUR GAME HERE ---
        const system = 'genesis'; // Options: nes, snes, genesis, gb, mame, etc.
        const gameUrl = 'Sonic_The_Hedgehog_2_(Simon_Wai_Prototype).bin'; 
        // --------------------------------

        const coreMap = {
            nes: 'fceumm',
            snes: 'snes9x',
            genesis: 'genesis_plus_gx',
            sega32x: 'picodrive',
            mame: 'mame2003_plus',
            gb: 'gambatte'
        };

        // EmulatorJS Configuration
        window.EJS_player = '#game';
        window.EJS_core = coreMap[system];
        window.EJS_gameUrl = gameUrl;
        window.EJS_pathtodata = 'https://deepakrummy.github.io/storage/emulatorjs/data/';
        window.EJS_startOnLoaded = true;

        // Load the Script
        const script = document.createElement('script');
        script.src = 'https://deepakrummy.github.io/storage/emulatorjs/data/loader.js';
        script.onload = () => {
            // Hide the loading text once the emulator takes over
            const checkLoaded = setInterval(() => {
                if (window.EJS_loaded) {
                    document.getElementById('loading-overlay').style.display = 'none';
                    clearInterval(checkLoaded);
                }
            }, 100);
        };
        document.body.appendChild(script);
    });
</script>

</body>
</html>
