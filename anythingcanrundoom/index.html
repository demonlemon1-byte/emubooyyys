

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents scrollbars while playing */
        }

        #game-container { 
            width: 100vw; 
            height: 100vh; 
            background: #000; 
        }

        /* Loading text while the emulator boots */
        #loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="loading-overlay">Loading...</div>
    <div id="game"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // --- DOS SPECIFIC CONFIG ---
        const system = 'dos'; 
        const gameUrl = 'doom.zip'; 
        // ---------------------------

        // EmulatorJS Configuration
        window.EJS_player = '#game';
        window.EJS_core = 'dosbox_pure'; // DOSBox core
        window.EJS_gameUrl = gameUrl;
        
        // Pointing to your external repo for data
        window.EJS_pathtodata = '../../../deepakrummy.github.io-for-taking-/storage/emulatorjs/data/';
        
        window.EJS_startOnLoaded = true;
        window.EJS_DEBUG_XX = true; // Helps bypass some cache/resize hangs
        window.EJS_mouse = true;    // Enables mouse capture for Doom
        window.EJS_multitap = false;

        // Load the Script
        const script = document.createElement('script');
        script.src = '../../../deepakrummy.github.io-for-taking-/storage/emulatorjs/data/loader.js';
        
        script.onload = () => {
            const checkLoaded = setInterval(() => {
                if (window.EJS_loaded) {
                    document.getElementById('loading-overlay').style.display = 'none';
                    
                    // FORCE RESIZE FIX: 
                    // Manually trigger a window resize event to satisfy 
                    // the "setCanvasSize" requirement after the core boots.
                    window.dispatchEvent(new Event('resize'));
                    
                    clearInterval(checkLoaded);
                }
            }, 200);
        };
        document.body.appendChild(script);
    });
</script>
</body>
</html>
